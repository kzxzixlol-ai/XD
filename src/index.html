<div class="titlebar-dots">
    <button class="close" aria-label="Close" onclick="remote.getCurrentWindow().close();">
        <span class="dot red"></span>
    </button>
    <button class="minimize" aria-label="Minimize" onclick="remote.getCurrentWindow().minimize();">
        <span class="dot yellow"></span>
    </button>
    <button class="maximize" aria-label="Maximize" onclick="remote.getCurrentWindow().maximize();">
        <span class="dot green"></span>
    </button>
</div>

<script>
    const { remote } = require('electron');
    const { BrowserWindow } = remote;
</script>
